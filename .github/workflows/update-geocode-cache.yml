name: Update geocode cache

# Runs whenever the spreadsheet changes on main, geocodes any new
# addresses, and commits the updated geocode-cache.json back to the repo.
# Only triggers on the spreadsheet itself — not on geocode-cache.json —
# so the commit this workflow makes doesn't re-trigger itself.
on:
  push:
    branches: [main]
    paths:
      - 'DGS LIST.xlsx'
      - 'DGS LIST.xls'
      - 'DGS LIST.csv'
  workflow_dispatch: {} # lets you manually re-run it from the Actions tab if needed

permissions:
  contents: write

jobs:
  update-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install xlsx

      - name: Update geocode cache
        run: node scripts/update-geocode-cache.mjs

      - name: Commit updated cache (if changed)
        run: |
          if git diff --quiet -- geocode-cache.json; then
            echo "No changes to geocode-cache.json"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add geocode-cache.json
          git commit -m "Auto-update geocode cache [skip pages rebuild wait]"
          git push
